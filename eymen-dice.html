<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eymen Color Dice</title>
    <style>
        /* Genel Tasarım ve Kalın Font */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', 'Impact', sans-serif;
            user-select: none;
        }

        body {
            /* Noktalı açık mavi arka plan deseni */
            background-color: #34b3f1;
            background-image: radial-gradient(rgba(255, 255, 255, 0.4) 15%, transparent 16%),
                              radial-gradient(rgba(255, 255, 255, 0.4) 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Üst Sağ Küçük Bilgi Butonları */
        .top-bar {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .top-badge {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: Arial, sans-serif;
            font-weight: bold;
        }

        /* Ana İki Panelli Düzen */
        .main-container {
            display: flex;
            gap: 25px;
            max-width: 1050px;
            width: 100%;
            align-items: stretch;
            justify-content: center;
        }

        /* Sol Ana Oyun Kutusu (Şeffaf Beyaz, Kalın Beyaz Kenarlıklı) */
        .game-panel {
            flex: 1.8;
            background: rgba(255, 255, 255, 0.25);
            border: 4px solid #ffffff;
            border-radius: 30px;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
        }

        /* Sağ Renk Listesi Kutusu (Koyu Mavi Şeffaf) */
        .side-panel {
            flex: 1;
            max-width: 290px;
            background: rgba(43, 108, 156, 0.75);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* Başlık Alanı - İsmi EYMEN yapıldı */
        h1 {
            color: white;
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0px 4px 0px rgba(0, 0, 0, 0.15);
            margin-bottom: 2px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            letter-spacing: 2.5px;
            margin-bottom: 25px;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }

        /* Seçim Menüleri */
        .selectors {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        select {
            background: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 12px;
            font-weight: 900;
            color: #2b6c9c;
            width: 46%;
            box-shadow: 0 5px 0px #b5c7d3;
            outline: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Küp Zarlar */
        .dice-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            min-height: 115px;
            align-items: center;
        }

        .dice {
            width: 95px;
            height: 95px;
            border-radius: 20px;
            border: 4px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease, background-color 0.1s ease, box-shadow 0.1s ease;
        }

        /* Zarların Derinlik Gölgeleri */
        .dice-red { background: #ff3344; box-shadow: 0 8px 0px #cc1122; }
        .dice-orange { background: #ff7f00; box-shadow: 0 8px 0px #cc5f00; }
        .dice-yellow { background: #ffcc29; box-shadow: 0 8px 0px #cc9900; }
        .dice-green { background: #2ed573; box-shadow: 0 8px 0px #1e9e52; }
        .dice-blue { background: #3b82f6; box-shadow: 0 8px 0px #1d4ed8; }
        .dice-purple { background: #a855f7; box-shadow: 0 8px 0px #7e22ce; }

        /* Zar Ortasındaki Beyaz Nokta */
        .dice::after {
            content: '';
            width: 14px;
            height: 14px;
            background-color: white;
            border-radius: 50%;
            display: block;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
        }

        /* NORMAL ROLL ANIMASYONU (Klasik Zıplama) */
        .dice.rolling {
            animation: jump 0.3s infinite alternate ease-in-out;
        }

        @keyframes jump {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        /* MEGA ROLL ANIMASYONU (Çok Hızlı Çılgın Zıplama) */
        .dice.mega-rolling {
            animation: megaJump 0.15s infinite alternate ease-in-out;
        }

        @keyframes megaJump {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-30px) scale(1.05); }
        }

        /* Bilgi Yazıları */
        .info-text {
            color: rgba(255, 255, 255, 0.95);
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        /* 3D Butonlar */
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.05s ease;
        }

        .btn:active {
            transform: translateY(4px);
        }

        .btn-yellow {
            background: #ffcc29;
            color: #7a5500;
            box-shadow: 0 6px 0px #cc9900;
        }
        .btn-yellow:active { box-shadow: 0 2px 0px #cc9900; }

        .btn-pink {
            background: #ff00cc;
            color: white;
            box-shadow: 0 6px 0px #b3008e;
        }
        .btn-pink:active { box-shadow: 0 2px 0px #b3008e; }

        .btn-green {
            background: #2ed573;
            color: #11572e;
            box-shadow: 0 6px 0px #229952;
        }
        .btn-green:active { box-shadow: 0 2px 0px #229952; }

        /* Olası Renkler Kutusu */
        .possible-colors {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 12px;
            padding: 10px;
            font-size: 0.75rem;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: Arial, sans-serif;
            font-weight: bold;
        }

        /* SAĞ PANEL */
        .side-panel h2 {
            color: #aed1ec;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .color-row {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.12);
            padding: 12px 15px;
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .color-box {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            margin-right: 15px;
            border: 2px solid white;
        }

        .color-info {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .color-name {
            color: white;
            font-size: 1rem;
        }

        .color-desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            font-family: Arial, sans-serif;
            font-weight: bold;
            margin-top: 2px;
        }

        .c-red { background: #ff3344; }
        .c-orange { background: #ff7f00; }
        .c-yellow { background: #ffcc29; }
        .c-green { background: #2ed573; }
        .c-blue { background: #3b82f6; }
        .c-purple { background: #a855f7; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; align-items: center; }
            .side-panel { max-width: 100%; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-badge">🔘 Sound</div>
        <div class="top-badge">🎨 Blue</div>
        <div class="top-badge">👤 Player</div>
    </div>

    <div class="main-container">

        <!-- SOL OYUN ALANI -->
        <div class="game-panel">
            <!-- Sitenin İsmi EYMEN yapıldı -->
            <h1>EYMEN DICE</h1>
            <div class="subtitle">MADE BY EYMEN</div>

            <div class="selectors">
                <select id="diceCount" onchange="changeDiceCount()">
                    <option value="2">2 Dice</option>
                    <option value="3" selected>3 Dice</option>
                    <option value="4">4 Dice</option>
                </select>
                <select>
                    <option>Color Dice</option>
                </select>
            </div>

            <div id="diceContainer" class="dice-area">
                <div class="dice dice-red"></div>
                <div class="dice dice-red"></div>
                <div class="dice dice-green"></div>
            </div>

            <div class="info-text">
                + EYMEN COLOR DICE +<br>
                FOLLOW AUTOR TIK TOK "sab_trader7424"
            </div>

            <button class="btn btn-yellow" onclick="rollAll(false)">ROLL AGAIN !</button>
            <button class="btn btn-pink" onclick="rollAll(true)">⚡ MEGA ROLL ⚡</button>
            <button class="btn btn-green">🪙 SCRATCH CARD</button>

            <div class="possible-colors">
                Possible colors are: <span style="color:#ff3344">Red</span>, <span style="color:#ff7f00">Orange</span>, <span style="color:#ffcc29">Yellow</span>, <span style="color:#2ed573">Green</span>, <span style="color:#3b82f6">Blue</span>, and <span style="color:#a855f7">Purple</span>.
            </div>
        </div>

        <!-- SAĞ PANEL -->
        <div class="side-panel">
            <h2>COLORS</h2>

            <div class="color-row">
                <div class="color-box c-red"></div>
                <div class="color-info">
                    <span class="color-name">Red</span>
                    <span class="color-desc">❌ Fail Trade</span>
                </div>
            </div>

            <div class="color-row">
                <div class="color-box c-orange"></div>
                <div class="color-info">
                    <span class="color-name">Orange</span>
                    <span class="color-desc">🤷 No Thanks</span>
                </div>
            </div>

            <div class="color-row">
                <div class="color-box c-yellow"></div>
                <div class="color-info">
                    <span class="color-name">Yellow</span>
                    <span class="color-desc">🤝 Deal?</span>
                </div>
            </div>

            <div class="color-row">
                <div class="color-box c-green"></div>
                <div class="color-info">
                    <span class="color-name">Green</span>
                    <span class="color-desc">✅ Fair Trade</span>
                </div>
            </div>

            <div class="color-row">
                <div class="color-box c-blue"></div>
                <div class="color-info">
                    <span class="color-name">Blue</span>
                    <span class="color-desc">📄 Last Offer</span>
                </div>
            </div>

            <div class="color-row">
                <div class="color-box c-purple"></div>
                <div class="color-info">
                    <span class="color-name">Purple</span>
                    <span class="color-desc">➕ Add More</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        const diceTypes = ['dice-red', 'dice-orange', 'dice-yellow', 'dice-green', 'dice-blue', 'dice-purple'];
        let intervalId = null;

        function changeDiceCount() {
            const count = document.getElementById('diceCount').value;
            const container = document.getElementById('diceContainer');
            container.innerHTML = '';
            
            for(let i = 0; i < count; i++) {
                const dice = document.createElement('div');
                const randomType = diceTypes[Math.floor(Math.random() * diceTypes.length)];
                dice.className = 'dice ' + randomType;
                container.appendChild(dice);
            }
        }

        function rollAll(isMega) {
            const dices = document.querySelectorAll('.dice');
            
            if (isMega) {
                // MEGA ROLL: Zarlar çok hızlı zıplar ve dönerken disko gibi sürekli renk değiştirir!
                dices.forEach(dice => dice.classList.add('mega-rolling'));
                
                // Renklerin çılgınca değiştiği disko efekti intervalı
                intervalId = setInterval(() => {
                    dices.forEach(dice => {
                        diceTypes.forEach(t => dice.classList.remove(t));
                        const randomType = diceTypes[Math.floor(Math.random() * diceTypes.length)];
                        dice.classList.add(randomType);
                    });
                }, 60); // 60ms'de bir renk değişimi (aşırı hızlı)

            } else {
                // NORMAL ROLL: Klasik zıplama efekti
                dices.forEach(dice => dice.classList.add('rolling'));
            }

            // Atışın Durma Süresi (Orijinal sitedeki gibi yarım saniye civarı sürer)
            setTimeout(() => {
                if (isMega && intervalId) {
                    clearInterval(intervalId);
                }

                dices.forEach(dice => {
                    dice.classList.remove('rolling');
                    dice.classList.remove('mega-rolling');
                    
                    // Önceki sınıfları temizle ve son neticeyi ata
                    diceTypes.forEach(t => dice.classList.remove(t));
                    const finalType = diceTypes[Math.floor(Math.random() * diceTypes.length)];
                    dice.classList.add(finalType);
                });
            }, isMega ? 1200 : 600); // Mega roll biraz daha uzun ve havalı sürer
        }
    </script>
</body>
</html>

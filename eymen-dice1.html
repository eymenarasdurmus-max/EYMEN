<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYMEN DICE</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #5bb3ff;
            background-image: radial-gradient(rgba(255, 255, 255, 0.4) 15%, transparent 16%);
            background-size: 30px 30px;
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        /* Mega Roll Aktifleştiğinde Arka Plan */
        body.mega-mode {
            background-color: #110b29;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 15%, transparent 16%);
        }

        /* Ana Düzen Alanı */
        .main-layout {
            display: flex;
            gap: 25px;
            width: 100%;
            max-width: 1050px;
        }

        /* Sol Oyun Paneli */
        .game-container {
            background: #a9dbff;
            border: 5px solid #fff;
            border-radius: 35px;
            padding: 30px;
            flex: 2;
            text-align: center;
            box-shadow: 0 10px 0px rgba(0,0,0,0.15);
        }

        /* Sağ Renk Listesi Paneli */
        .colors-sidebar {
            background: #3e88c7;
            border-radius: 35px;
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 10px 0px rgba(0,0,0,0.15);
        }

        .sidebar-title {
            color: #fff;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-align: center;
        }

        .color-row {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 15px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .color-box {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            border: 2px solid #fff;
        }

        .color-info {
            display: flex;
            flex-direction: column;
            text-align: left;
            font-size: 0.9rem;
        }

        .color-name { color: #fff; font-weight: bold; }
        .color-desc { color: #d0e5ff; font-family: sans-serif; font-size: 0.75rem; margin-top: 2px;}

        /* Üst Seçenek Seçiciler */
        .selectors {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .selector-select {
            background: #fff;
            padding: 12px 20px;
            border-radius: 14px;
            color: #2b618f;
            font-size: 1.1rem;
            flex: 1;
            max-width: 200px;
            border: 3px solid #3e88c7;
            font-weight: bold;
            font-family: 'Arial Black', Gadget, sans-serif;
            cursor: pointer;
            outline: none;
            text-align: center;
            appearance: none; /* Tarayıcıların kendi ok işaretlerini kaldırır, bug önler */
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        h1 {
            font-size: 3.2rem;
            color: #fff;
            margin: 5px 0;
            letter-spacing: 3px;
            text-shadow: 0 5px 0px rgba(0,0,0,0.15);
        }

        .subtitle {
            font-size: 0.85rem;
            color: #fff;
            opacity: 0.9;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Esnek Zar Bölümü (Zarlar arttıkça sığması için güncellendi) */
        .dice-area {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 35px 0;
            min-height: 125px;
        }

        .dice {
            width: 95px;
            height: 95px;
            border-radius: 22px;
            border: 5px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 0px rgba(0,0,0,0.15);
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }

        .dice-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
        }

        /* Sosyal Medya Metni */
        .info-text {
            color: #fff;
            font-size: 0.8rem;
            margin: 25px 0;
            letter-spacing: 1.5px;
            line-height: 1.6;
        }

        /* Butonlar */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            margin: 14px 0;
            border: none;
            border-radius: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 0px rgba(0,0,0,0.15);
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.15);
        }

        .btn-normal { background: #ffb703; color: #4a3200; }
        .btn-mega { background: #ff00b7; color: #fff; }
        .btn-scratch { background: #2ec4b6; color: #fff; }

        /* --- ANIMASYONLAR --- */
        .roll-animation {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, -1px) rotate(3deg); }
            40% { transform: translate(1px, -1px) rotate(-2deg); }
            60% { transform: translate(-2px, 2px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }

        .mega-reveal {
            animation: megaPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes megaPop {
            0% { opacity: 0; transform: scale(0.1) rotate(-180deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* Tam Ekran Geçiş Katmanı */
        .mega-title-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #090514;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .mega-title-screen.active {
            display: flex;
        }

        .mega-text {
            font-size: 4.5rem;
            font-weight: 900;
            color: #ff00b7;
            letter-spacing: 5px;
            text-shadow: 0 0 25px rgba(255, 0, 183, 0.7);
        }

        .possible-colors {
            font-size: 0.8rem;
            color: #fff;
            margin-top: 20px;
            font-family: sans-serif;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Mega Roll Geçiş Ekranı -->
    <div class="mega-title-screen" id="megaScreen">
        <div class="mega-text">⚡ MEGA ROLL ⚡</div>
        <div style="color: #a9dbff; margin-top: 15px; letter-spacing: 2px; font-size: 1.2rem;">ULTIMATE LUCK</div>
    </div>

    <!-- ANA DÜZEN KATMANI -->
    <div class="main-layout">
        <!-- SOL PANEL -->
        <div class="game-container">
            <h1>EYMEN DICE</h1>
            <div class="subtitle">MADE BY EYMEN</div>

            <div class="selectors">
                <!-- Zar Seçenekleri -->
                <select class="selector-select" id="diceCountSelect" onchange="updateDiceCount()">
                    <option value="1">1 DICE</option>
                    <option value="2">2 DICE</option>
                    <option value="3" selected>3 DICE</option>
                    <option value="4">4 DICE</option>
                    <option value="5">5 DICE</option>
                    <option value="6">6 DICE</option>
                </select>
                <select class="selector-select">
                    <option>COLOR DICE</option>
                </select>
            </div>

            <!-- Dinamik Zarlar -->
            <div class="dice-area" id="diceArea"></div>

            <div class="info-text">
                + EYMEN COLOR DICE +<br>
                FOLLOW AUTOR TIK TOK "sab_trader7424"
            </div>

            <!-- Butonlar -->
            <button class="btn btn-normal" onclick="triggerNormalRoll()">ROLL AGAIN !</button>
            <button class="btn btn-mega" onclick="triggerMegaRoll()">⚡ MEGA ROLL ⚡</button>
            <button class="btn btn-scratch">🎟️ SCRATCH CARD</button>

            <div class="possible-colors">
                Possible colors are: <span style="color:#ff0055">Red</span>, <span style="color:#ff7300">Orange</span>, <span style="color:#ffb703">Yellow</span>, <span style="color:#00ff66">Green</span>, <span style="color:#0077ff">Blue</span>, and <span style="color:#7f00ff">Purple</span>.
            </div>
        </div>

        <!-- SAĞ PANEL -->
        <div class="colors-sidebar">
            <div class="sidebar-title">COLORS</div>
            
            <div class="color-row">
                <div class="color-box" style="background: #ff0055;"></div>
                <div class="color-info"><span class="color-name">Red</span><span class="color-desc">❌ Fail Trade</span></div>
            </div>
            <div class="color-row">
                <div class="color-box" style="background: #ff7300;"></div>
                <div class="color-info"><span class="color-name">Orange</span><span class="color-desc">👍 No Thanks</span></div>
            </div>
            <div class="color-row">
                <div class="color-box" style="background: #ffb703;"></div>
                <div class="color-info"><span class="color-name">Yellow</span><span class="color-desc">🤝 Deal?</span></div>
            </div>
            <div class="color-row">
                <div class="color-box" style="background: #00ff66;"></div>
                <div class="color-info"><span class="color-name">Green</span><span class="color-desc">✅ Fair Trade</span></div>
            </div>
            <div class="color-row">
                <div class="color-box" style="background: #0077ff;"></div>
                <div class="color-info"><span class="color-name">Blue</span><span class="color-desc">📄 Last Offer</span></div>
            </div>
            <div class="color-row">
                <div class="color-box" style="background: #7f00ff;"></div>
                <div class="color-info"><span class="color-name">Purple</span><span class="color-desc">➕ Add More</span></div>
            </div>
        </div>
    </div>

    <script>
        const colors = ['#ff0055', '#ff7300', '#ffb703', '#00ff66', '#0077ff', '#7f00ff'];
        const diceArea = document.getElementById('diceArea');
        const megaScreen = document.getElementById('megaScreen');
        const diceCountSelect = document.getElementById('diceCountSelect');
        const body = document.body;

        // Seçilen sayıya göre zarları baştan oluşturan fonksiyon
        function updateDiceCount() {
            const count = parseInt(diceCountSelect.value);
            diceArea.innerHTML = ''; 
            
            for(let i=0; i<count; i++) {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                
                const diceDiv = document.createElement('div');
                diceDiv.className = 'dice';
                diceDiv.style.backgroundColor = randomColor;
                
                const dotDiv = document.createElement('div');
                dotDiv.className = 'dice-dot';
                
                diceDiv.appendChild(dotDiv);
                diceArea.appendChild(diceDiv);
            }
        }

        // 1. Normal Roll Fonksiyonu
        function triggerNormalRoll() {
            body.classList.remove('mega-mode');
            const dices = diceArea.querySelectorAll('.dice');
            
            dices.forEach(dice => {
                dice.style.opacity = "1";
                dice.className = 'dice'; 
                void dice.offsetWidth; 
                
                dice.classList.add('roll-animation');
                
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                dice.style.backgroundColor = randomColor;
                dice.style.boxShadow = `0 8px 0px rgba(0,0,0,0.15)`;
            });
        }

        // 2. Sıralı Mega Roll Fonksiyonu
        function triggerMegaRoll() {
            megaScreen.classList.add('active');
            
            setTimeout(() => {
                megaScreen.classList.remove('active');
                body.classList.add('mega-mode');
                
                const dices = diceArea.querySelectorAll('.dice');
                
                dices.forEach((dice, index) => {
                    dice.className = 'dice';
                    dice.style.opacity = '0';
                    void dice.offsetWidth;
                    
                    setTimeout(() => {
                        const randomColor = colors[Math.floor(Math.random() * colors.length)];
                        dice.style.backgroundColor = randomColor;
                        
                        dice.classList.add('mega-reveal');
                        dice.style.boxShadow = `0 0 25px ${randomColor}, 0 0 45px ${randomColor}`;
                    }, index * 250); 
                });
            }, 1000);
        }

        // İlk yükleme
        updateDiceCount();
    </script>
</body>
</html>
